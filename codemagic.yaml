workflows:
  android-debug:
    name: DSMP PvP Client — Debug APK
    max_build_duration: 60
    environment:
      java: 17
    scripts:
      - name: Grant Gradle wrapper execute permission
        script: chmod +x gradlew

      - name: Set Android SDK location
        script: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Build debug APK
        script: |
          export GRADLE_OPTS="-Xmx2048m -Dfile.encoding=UTF-8"
          ./gradlew assembleDebug --no-daemon --info 2>&1 | tail -150
    artifacts:
      - app/build/outputs/apk/debug/*.apk
    publishing:
      email:
        recipients:
          - bedwarguyblox@gmail.com
        notify:
          success: true
          failure: true
