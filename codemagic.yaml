workflows:
  android-debug:
    name: DSMP PvP Client — Debug APK
    max_build_duration: 60
    environment:
      java: 17
    scripts:
      - name: Grant Gradle wrapper execute permission
        script: chmod +x gradlew
      - name: Build debug APK
        script: ./gradlew assembleDebug --stacktrace
    artifacts:
      - app/build/outputs/apk/debug/*.apk
    publishing:
      email:
        recipients:
          - your@email.com
        notify:
          success: true
          failure: true
